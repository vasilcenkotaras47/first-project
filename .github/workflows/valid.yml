name: Oracle Node

on:
  schedule:
    # Запуск о 50-й хвилині кожні 4 години (00:50, 04:50 і т.д.)
    - cron: '20 */4 * * *'
  workflow_dispatch:

jobs:
  make-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch LINK Price
        run: |
          # 1. Рандомна затримка (до 20 хвилин)
          sleep $((RANDOM % 1100))
          
          TIMESTAMP=$(date "+%Y-%m-%d %H:%M")

          # 2. Отримуємо ціну LINK (ідентифікатор: chainlink)
          RESPONSE=$(curl -s --max-time 15 "https://api.coingecko.com/api/v3/simple/price?ids=chainlink&vs_currencies=usd")
          LINK=$(echo $RESPONSE | jq -r '.chainlink.usd // empty')

          # 3. Назва файлу (стиль: Оракул/Дані)
          FILE_NAME="validator.info"

          # 4. Логіка запису
          if [ -z "$LINK" ] || [ "$LINK" == "null" ]; then
            # План Б: системне повідомлення (стиль Оракула)
            LOG_ENTRY="[$TIMESTAMP] Validator: block proposed"
            COMMIT_MSG="oracle: heartbeat $TIMESTAMP [skip ci]"
          else
            # План А: ціна монети
            LOG_ENTRY="[$TIMESTAMP] LINK Price Feed: \$$LINK USD"
            COMMIT_MSG="data: link oracle update $TIMESTAMP [skip ci]"
          fi

          # 5. Оновлення файлу та збереження останніх 40 рядків
          echo "$LOG_ENTRY" >> $FILE_NAME
          echo "$(tail -n 43 $FILE_NAME)" > $FILE_NAME

          # 6. Пуш у репозиторій
          git config --local user.email "vasilcenkotaras47@gmail.com"
          git config --local user.name "GitHub Action Bot"
          git add $FILE_NAME
          git commit -m "$COMMIT_MSG"
          git push
